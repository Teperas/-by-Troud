<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대장간 관리 매니저</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent-color: #f39c12;
            --text-color: #ffffff;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Pretendard', sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 500px; }
        
        /* 상단 입력 영역 */
        .input-group { 
            background: var(--card-bg); 
            padding: 20px; border-radius: 15px; 
            margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .input-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .input-item:last-child { margin-bottom: 0; }
        .input-item label { font-size: 0.9rem; color: #bbb; }
        .input-item input { 
            width: 50%; background: #444; border: 1px solid #555; 
            color: white; padding: 8px; border-radius: 8px; text-align: right;
        }

        /* 표 영역 */
        table { 
            width: 100%; border-collapse: collapse; 
            background: var(--card-bg); border-radius: 15px; overflow: hidden; 
        }
        th { background: var(--accent-color); color: black; padding: 12px; font-size: 0.9rem; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #444; font-size: 0.85rem; }
        tr:last-child td { border-bottom: none; }
        .cost-text { color: #00d2ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--accent-color);">⚒️ 대장간 설정</h2>
    
    <div class="input-group">
        <div class="input-item">
            <label>업그레이드 비용 감소 (%)</label>
            <input type="number" id="costReduction" placeholder="0" oninput="updateTable()">
        </div>
        <div class="input-item">
            <label>장비 판매 가격</label>
            <input type="number" id="sellPrice" placeholder="0">
        </div>
        <div class="input-item">
            <label>무료 제련 기회</label>
            <input type="number" id="freeRefine" placeholder="0">
        </div>
        <div class="input-item">
            <label>장비 최대 레벨</label>
            <input type="number" id="maxLevel" placeholder="0">
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>레벨</th>
                <th>비용</th>
                <th>시간</th>
            </tr>
        </thead>
        <tbody id="dataBody">
            </tbody>
    </table>
</div>

<script>
    const rawData = [
        [2, 400, "5m"], [3, 700, "15m"], [4, 1500, "30m"], [5, 3500, "1h"],
        [6, 10000, "2h"], [7, 25000, "7h 33m"], [8, 50000, "13h 6m"], [9, 100000, "18h 39m"],
        [10, 150000, "1d 13m"], [11, 250000, "1d 11h"], [12, 336000, "2d 1h"], [13, 452000, "2d 17h"],
        [14, 612000, "3d 13h"], [15, 830000, "4d 11h"], [16, 1120000, "5d 9h"], [17, 1512000, "6d 7h"],
        [18, 2037000, "7d 6h"], [19, 2752000, "8d 4h"], [20, 3717000, "9d 2h"], [21, 5020000, "10d 53m"],
        [22, 6780000, "10d 23h"], [23, 9160000, "11d 21h"], [24, 12300000, "12d 19h"], [25, 16600000, "13d 17h"],
        [26, 20000000, "14d 15h"], [27, 24000000, "15d 14h"], [28, 28800000, "16d 12h"], [29, 34600000, "17d 10h"],
        [30, 41500000, "18d 8h"], [31, 49800000, "19d 7h"], [32, 59800000, "20d 5h"], [33, 71700000, "21d 3h"],
        [34, 86100000, "22d 1h"], [35, 103000000, "23d"]
    ];

    // 비용 단위 변환 함수 (k, m)
    function formatCost(num) {
        if (num >= 1000000) {
            return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'm';
        } else if (num >= 1000) {
            return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
        }
        return num.toLocaleString();
    }

    function updateTable() {
        const reduction = document.getElementById('costReduction').value || 0;
        const tbody = document.getElementById('dataBody');
        tbody.innerHTML = '';

        rawData.forEach(row => {
            const tr = document.createElement('tr');
            
            // 비용 감소 적용 계산
            const originalCost = row[1];
            const reducedCost = Math.floor(originalCost * (1 - reduction / 100));

            tr.innerHTML = `
                <td>Lv.${row[0]}</td>
                <td class="cost-text">${formatCost(reducedCost)}</td>
                <td>${row[2]}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 초기 실행
    updateTable();
</script>

</body>
</html>
